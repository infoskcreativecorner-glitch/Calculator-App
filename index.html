<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator Application</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <section class="calculator" aria-label="Calculator Application">
      <header class="calc-header">
        <p class="brand">Calculator Application</p>
        <p class="subtext">Final Year Mini Project</p>
      </header>

      <div class="display-wrap">
        <label for="display" class="sr-only">Calculator Display</label>
        <input id="display" class="display" type="text" value="0" readonly />
        <p id="status" class="status" aria-live="polite"></p>
      </div>

      <div class="keys" role="group" aria-label="Calculator Keys">
        <button type="button" class="btn btn-soft" data-action="clear">C</button>
        <button type="button" class="btn btn-soft" data-value="(">(</button>
        <button type="button" class="btn btn-soft" data-value=")">)</button>
        <button type="button" class="btn btn-op" data-value="/">/</button>

        <button type="button" class="btn" data-value="7">7</button>
        <button type="button" class="btn" data-value="8">8</button>
        <button type="button" class="btn" data-value="9">9</button>
        <button type="button" class="btn btn-op" data-value="*">*</button>

        <button type="button" class="btn" data-value="4">4</button>
        <button type="button" class="btn" data-value="5">5</button>
        <button type="button" class="btn" data-value="6">6</button>
        <button type="button" class="btn btn-op" data-value="-">-</button>

        <button type="button" class="btn" data-value="1">1</button>
        <button type="button" class="btn" data-value="2">2</button>
        <button type="button" class="btn" data-value="3">3</button>
        <button type="button" class="btn btn-op" data-value="+">+</button>

        <button type="button" class="btn" data-value="0">0</button>
        <button type="button" class="btn" data-value=".">.</button>
        <button type="button" class="btn btn-soft" data-action="backspace">⌫</button>
        <button type="button" class="btn btn-eq" data-action="equals">=</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
